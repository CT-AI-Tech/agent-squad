name: plugin-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: validate manifests, frontmatter, hooks, and tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # ─── Manifest JSON validity ─────────────────────────────────────────
      - name: Validate plugin.json
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json'))"

      - name: Validate marketplace.json
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json'))"

      # ─── Hook script syntax check ──────────────────────────────────────
      - name: Syntax-check construct hooks
        run: |
          for f in hooks/*.js hooks/lib/*.js bin/*.js; do
            [ -f "$f" ] || continue
            node --check "$f"
          done

      - name: Syntax-check skill hooks
        run: |
          for f in skills/*/hooks/*.js; do
            [ -f "$f" ] || continue
            node --check "$f"
          done

      # ─── Persona frontmatter validation ─────────────────────────────────
      - name: Validate persona frontmatter
        run: node bin/validate-frontmatter.js personas/lead.md personas/architect.md personas/implementer.md

      # ─── Skill frontmatter validation ───────────────────────────────────
      - name: Validate core skill frontmatter
        run: |
          for skill in skills/*/SKILL.md; do
            [ -f "$skill" ] || continue
            node bin/validate-frontmatter.js "$skill"
          done

      - name: Validate domain skill frontmatter (if any)
        run: |
          shopt -s nullglob
          for skill in skills/domain/*/SKILL.md; do
            node bin/validate-frontmatter.js "$skill"
          done

      # ─── Example AGENTS.md role-schema validation ───────────────────────
      - name: Validate example AGENTS.md role schema
        run: node bin/validate-role-schema.js examples/AGENTS.md.example

      # ─── Smoke tests for hooks + validators ─────────────────────────────
      - name: Run smoke tests
        run: node tests/run.js
